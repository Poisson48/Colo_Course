name: Android

# Étapes du build APK, réutilisées par ci.yml (artefact) et release.yml (Release GitHub).
on:
  workflow_call:
    inputs:
      version_name:
        description: "android:versionName"
        type: string
        default: "0.1.0"
      version_code:
        description: "android:versionCode"
        type: string
        default: "1"

env:
  QT_VER: 6.8.2
  NDK_VER: 26.1.10909125
  BUILD_TOOLS_VER: 35.0.0

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Outils de build
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake

      - name: Android NDK + build-tools
        # Le SDK est préinstallé sur le runner, mais sdkmanager n'est pas dans le PATH.
        run: |
          SDKMANAGER="$(find "$ANDROID_SDK_ROOT/cmdline-tools" -name sdkmanager -type f | head -1)"
          [ -n "$SDKMANAGER" ] || { echo "sdkmanager introuvable dans $ANDROID_SDK_ROOT" >&2; exit 1; }
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" --install "platforms;android-35" \
                                  "build-tools;${BUILD_TOOLS_VER}" \
                                  "ndk;${NDK_VER}"

      # Qt hôte (androiddeployqt, qmlimportscanner) + Qt Android, même version.
      - name: Cache Qt
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ~/Qt
          key: qt-${{ env.QT_VER }}-linux-android-arm64

      - name: Qt ${{ env.QT_VER }} (hôte + android_arm64_v8a)
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          python3 -m pip install --user aqtinstall
          python3 -m aqt install-qt linux desktop "$QT_VER" linux_gcc_64 \
            -m qtwebsockets -O "$HOME/Qt"
          python3 -m aqt install-qt linux android "$QT_VER" android_arm64_v8a \
            -m qtwebsockets -O "$HOME/Qt"

      - name: Cache libs arm64
        id: cache-libs
        uses: actions/cache@v4
        with:
          path: ~/android-libs
          key: androidlibs-arm64-sodium1.0.20-secp0.7.0-ndk${{ env.NDK_VER }}

      - name: Cross-compile libsodium + libsecp256k1
        if: steps.cache-libs.outputs.cache-hit != 'true'
        run: |
          ANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VER" \
            bash scripts/build-android-deps.sh

      - name: Build + signature de l'APK
        env:
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
          OUT: ${{ github.workspace }}/colocourse-arm64.apk
        # ANDROID_SDK_ROOT vient du runner : il n'existe que dans l'env du shell.
        run: SDK_ROOT="$ANDROID_SDK_ROOT" bash scripts/build-android.sh

      - uses: actions/upload-artifact@v4
        with:
          name: colocourse-arm64-apk
          path: colocourse-arm64.apk
          if-no-files-found: error
