name: Desktop

# Construit l'AppImage Linux x86-64. Réutilisé par ci.yml (artefact) et release.yml
# (joint à la Release GitHub). AppImage autonome : Qt embarqué, lançable partout.
on:
  workflow_call:
    inputs:
      version_name:
        description: "Version, pour le nom du fichier"
        type: string
        default: "0.0.0"

env:
  QT_VER: 6.8.2

jobs:
  appimage:
    # Ubuntu ancien = glibc plus vieille = AppImage compatible avec plus de distributions.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Outils et bibliothèques
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake \
            libsodium-dev libsecp256k1-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
            libfontconfig1 libfreetype6 wget file

      - name: Cache Qt
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: ~/Qt
          key: qt-desktop-${{ env.QT_VER }}-linux-gcc64

      - name: Qt ${{ env.QT_VER }} (desktop)
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          python3 -m pip install --user aqtinstall
          # qtdeclarative (fourni par défaut) apporte Quick, Controls, Dialogs, Layouts.
          python3 -m aqt install-qt linux desktop "$QT_VER" linux_gcc_64 \
            -m qtwebsockets qtmultimedia qtimageformats -O "$HOME/Qt"

      - name: Cache des outils AppImage
        uses: actions/cache@v4
        with:
          path: build/appimage-tools
          key: appimage-tools-linuxdeploy

      - name: Build + AppImage
        env:
          VERSION_NAME: ${{ inputs.version_name }}
        run: |
          QT_ROOT="$HOME/Qt/$QT_VER/gcc_64"
          export PATH="$QT_ROOT/bin:$PATH"
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT"
          cmake --build build --target colocourse -j"$(nproc)"
          QT_ROOT="$QT_ROOT" VERSION_NAME="$VERSION_NAME" bash scripts/build-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: colocourse-appimage
          path: ColoCourse-*-x86_64.AppImage
          if-no-files-found: error
